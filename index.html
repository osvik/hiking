<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hiking Assistant</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .custom-controls {
      position: fixed;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .zoom-controls {
      top: 16px;
      right: 16px;
    }

    .center-controls {
      bottom: 32px;
      right: 16px;
    }

    .map-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 24px;
      font-weight: 700;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.15s;
    }

    .map-btn:active {
      background: #e0e0e0;
    }

    .map-btn svg {
      width: 24px;
      height: 24px;
      fill: #333;
      pointer-events: none;
    }

    .location-badge {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      pointer-events: none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .location-badge.error {
      background: rgba(180,0,0,0.8);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="location-badge" id="locationBadge">📍 Locating...</div>

  <div class="custom-controls zoom-controls">
    <button class="map-btn" id="zoomInBtn"  aria-label="Zoom in"  title="Zoom in">+</button>
    <button class="map-btn" id="zoomOutBtn" aria-label="Zoom out" title="Zoom out">−</button>
  </div>

  <div class="custom-controls center-controls">
    <button class="map-btn" id="centerBtn" aria-label="Center on my location" title="Center on my location">
      <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
    </button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    (function() {
      const DEFAULT_COORDS = [40.4168, -3.7038];
      const DEFAULT_ZOOM = 16;
      const MAX_ZOOM = 18;
      const MIN_ZOOM = 3;

      let map;
      let userMarker;
      let userCircle;
      let trackingId;
      let currentZoom = DEFAULT_ZOOM;
      let followingUser = true;

      const badgeEl = document.getElementById('locationBadge');
      const centerBtn = document.getElementById('centerBtn');
      const zoomInBtn = document.getElementById('zoomInBtn');
      const zoomOutBtn = document.getElementById('zoomOutBtn');

      function initMap() {
        map = L.map('map', {
          zoomControl: false,
          attributionControl: false,
        }).setView(DEFAULT_COORDS, DEFAULT_ZOOM);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
        }).addTo(map);

        L.control.attribution({
          prefix: false,
          position: 'bottomleft'
        }).addTo(map);

        map.on('zoom', function() {
          currentZoom = map.getZoom();
        });

        map.on('movestart', function() {
          followingUser = false;
          updateCenterButtonStyle();
        });
      }

      function createUserMarker(lat, lng, accuracy) {
        var icon = L.divIcon({
          className: '',
          html: '<svg width="28" height="28" viewBox="0 0 24 24" style="transform:translate(-14px,-14px)">'
              + '<circle cx="12" cy="12" r="11" fill="#007aff" stroke="#fff" stroke-width="3" opacity="0.95"/>'
              + '<circle cx="12" cy="12" r="4" fill="#fff"/>'
              + '</svg>',
          iconSize: [28, 28],
          iconAnchor: [14, 14],
        });

        if (userMarker) {
          map.removeLayer(userMarker);
        }
        if (userCircle) {
          map.removeLayer(userCircle);
        }

        userMarker = L.marker([lat, lng], { icon: icon, zIndexOffset: 900 }).addTo(map);

        if (accuracy) {
          userCircle = L.circle([lat, lng], {
            radius: accuracy,
            weight: 1,
            color: '#007aff',
            fillColor: '#007aff',
            fillOpacity: 0.12,
          }).addTo(map);
        }
      }

      function moveToUser(lat, lng, animate) {
        followingUser = true;
        updateCenterButtonStyle();

        if (animate) {
          map.flyTo([lat, lng], currentZoom, { duration: 0.8 });
        } else {
          map.setView([lat, lng], currentZoom);
        }
      }

      function updateCenterButtonStyle() {
        if (followingUser) {
          centerBtn.style.background = '#007aff';
          centerBtn.querySelector('svg').style.fill = '#fff';
        } else {
          centerBtn.style.background = '#fff';
          centerBtn.querySelector('svg').style.fill = '#333';
        }
      }

      function startTracking() {
        if (!navigator.geolocation) {
          badgeEl.textContent = '❌ Geolocation not supported';
          badgeEl.className = 'location-badge error';
          return;
        }

        trackingId = navigator.geolocation.watchPosition(
          function(position) {
            var lat = position.coords.latitude;
            var lng = position.coords.longitude;
            var acc = position.coords.accuracy;

            createUserMarker(lat, lng, acc);

            if (followingUser) {
              map.setView([lat, lng]);
            }

            badgeEl.textContent = '📍 ' + lat.toFixed(5) + ', ' + lng.toFixed(5)
              + ' (±' + Math.round(acc) + 'm)';
            badgeEl.className = 'location-badge';

            if (!map._initialPositionSet) {
              map._initialPositionSet = true;
              currentZoom = DEFAULT_ZOOM;
              map.setView([lat, lng], currentZoom);
            }
          },
          function(err) {
            var msg;
            switch(err.code) {
              case err.PERMISSION_DENIED: msg = '❌ Location denied'; break;
              case err.POSITION_UNAVAILABLE: msg = '❌ No position available'; break;
              case err.TIMEOUT: msg = '❌ Location timeout'; break;
              default: msg = '❌ Unknown error'; break;
            }
            badgeEl.textContent = msg;
            badgeEl.className = 'location-badge error';
          },
          {
            enableHighAccuracy: true,
            maximumAge: 1000,
            timeout: 15000,
          }
        );
      }

      function stopTracking() {
        if (trackingId != null) {
          navigator.geolocation.clearWatch(trackingId);
          trackingId = null;
        }
      }

      centerBtn.addEventListener('click', function() {
        if (!userMarker) return;

        var latlng = userMarker.getLatLng();
        followingUser = true;
        updateCenterButtonStyle();
        map.flyTo(latlng, currentZoom, { duration: 0.6 });
      });

      zoomInBtn.addEventListener('click', function() {
        if (currentZoom < MAX_ZOOM) {
          currentZoom++;
          map.setZoom(currentZoom);
        }
      });

      zoomOutBtn.addEventListener('click', function() {
        if (currentZoom > MIN_ZOOM) {
          currentZoom--;
          map.setZoom(currentZoom);
        }
      });

      initMap();
      startTracking();
    })();
  </script>
</body>
</html>
