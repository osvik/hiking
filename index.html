<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hiking Assistant</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>
  <div class="location-badge" id="locationBadge">📍 Locating...</div>
  <div class="sharing-label" id="sharingLabel" style="display:none">Sharing</div>

  <div class="custom-controls zoom-controls">
    <button class="map-btn" id="menuBtn" aria-label="Menu" title="Menu">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="2" rx="1"/><rect x="3" y="11" width="18" height="2" rx="1"/><rect x="3" y="18" width="18" height="2" rx="1"/></svg>
    </button>
    <button class="map-btn" id="zoomInBtn"  aria-label="Zoom in"  title="Zoom in">+</button>
    <button class="map-btn" id="zoomOutBtn" aria-label="Zoom out" title="Zoom out">−</button>
  </div>

  <div class="menu-dropdown" id="menuDropdown">
    <div class="menu-item active" id="menuMap">Map</div>
    <div class="menu-item" id="menuSatellite">Satellite</div>
    <div class="menu-item" id="menuCompass">Compass</div>
    <div class="menu-item" id="menuWeather">Weather</div>
    <div class="menu-item" id="menuList">List</div>
    <div class="menu-item" id="menuShareLocation">Share location</div>
    <div class="menu-item" id="menuCreateRoute">Create route</div>
    <div class="menu-item" id="menuFinishRoute" style="display:none">Finish this route</div>
    <div class="menu-item" id="menuAdmin">Admin Routes</div>
    <div class="menu-item" id="menuAbout">About</div>
  </div>

  <button class="add-point-btn" id="addPointBtn" style="display:none">+ Add Point</button>

  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal-card">
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="modalCancel">Cancel</button>
        <button class="modal-btn modal-btn-submit" id="modalSubmit">OK</button>
      </div>
    </div>
  </div>

  <div class="custom-controls center-controls">
    <button class="map-btn" id="centerBtn" aria-label="Center on my location" title="Center on my location">
      <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
    </button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="offlineQueue.js"></script>
  <script type="module" src="map.js"></script>
</body>
</html>
