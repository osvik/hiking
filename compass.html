<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Compass</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      display: block;
    }

    .badge {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      pointer-events: none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .badge.error {
      background: rgba(180,0,0,0.8);
    }

    .location-badge-bottom {
      top: auto;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .permission-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .permission-overlay.hidden {
      display: none;
    }

    .permission-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: #007aff;
      box-shadow: 0 2px 12px rgba(0,122,255,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.1s;
    }

    .permission-btn:active {
      transform: scale(0.94);
      background: #0066d6;
    }

    .permission-btn svg {
      width: 28px;
      height: 28px;
      fill: #fff;
    }

    .menu-controls {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.15s;
    }

    .map-btn:active {
      background: #e0e0e0;
    }

    .map-btn svg {
      width: 24px;
      height: 24px;
      fill: #333;
      pointer-events: none;
    }

    .menu-dropdown {
      position: fixed;
      top: 68px;
      right: 16px;
      z-index: 1001;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      overflow: hidden;
      min-width: 140px;
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
    }

    .menu-dropdown.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .menu-item {
      display: block;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 500;
      color: #333;
      text-decoration: none;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      user-select: none;
      -webkit-user-select: none;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item:active {
      background: #e0e0e0;
    }

    .menu-item.active {
      color: #007aff;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="badge" id="badge">0° N</div>
  <div class="badge location-badge-bottom" id="locationBadge">📍 Locating...</div>
  <canvas id="c"></canvas>

  <div class="menu-controls">
    <button class="map-btn" id="menuBtn" aria-label="Menu" title="Menu">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="2" rx="1"/><rect x="3" y="11" width="18" height="2" rx="1"/><rect x="3" y="18" width="18" height="2" rx="1"/></svg>
    </button>
  </div>

  <div class="menu-dropdown" id="menuDropdown">
    <a class="menu-item" href="index.html">Map</a>
    <a class="menu-item active" href="compass.html">Compass</a>
    <a class="menu-item" href="weather.html">Weather</a>
    <a class="menu-item" href="list.html">List</a>
    <a class="menu-item" href="admin.html">Admin Routes</a>
    <a class="menu-item" href="about.html">About</a>
  </div>

  <div class="permission-overlay hidden" id="permissionOverlay">
    <button class="permission-btn" id="permissionBtn" aria-label="Enable compass">
      <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z"/></svg>
    </button>
  </div>

  <script>
    (function () {
      const badge = document.getElementById('badge');
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      const overlay = document.getElementById('permissionOverlay');
      const permBtn = document.getElementById('permissionBtn');
      const menuBtn = document.getElementById('menuBtn');
      const menuDropdown = document.getElementById('menuDropdown');

      var devicePixelRatio = window.devicePixelRatio || 1;
      var targetHeading = 0;
      var displayHeading = 0;
      var hasHeading = false;
      var isAbsolute = false;
      var size, cx, cy, outerR;
      var headingsBuffer = [];
      var lastAvgTime = 0;

      /**
       * Converts a heading in degrees to its cardinal direction abbreviation.
       *
       * @param {number} h - Heading in degrees (0–360).
       * @returns {string} Cardinal direction (e.g. "N", "SE", "WNW").
       */
      function cardinal(h) {
        var dirs = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE',
                    'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
        return dirs[Math.round(h / 22.5) % 16];
      }

      /**
       * Updates the badge element with the current heading and cardinal direction.
       */
      function updateBadge() {
        var h = Math.round(displayHeading);
        badge.textContent = h + '° ' + cardinal(h);
      }

      /**
       * Recalculates canvas dimensions for the current viewport size,
       * centring coordinates, and the outer compass radius.
       */
      function resize() {
        var w = window.innerWidth;
        var h = window.innerHeight;
        size = Math.min(w, h) * 0.82;
        if (size > 360) size = 360;
        canvas.width = size * devicePixelRatio;
        canvas.height = size * devicePixelRatio;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
        cx = canvas.width / 2;
        cy = canvas.height / 2;
        outerR = (size * devicePixelRatio) / 2 - 6 * devicePixelRatio;
      }

      /**
       * Renders the compass face — tick marks, cardinal labels, centre dot,
       * and the north-pointing indicator — rotated to the current heading.
       */
      function draw() {
        var dpr = devicePixelRatio;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.scale(dpr, dpr);

        var cssOuterR = outerR / dpr;
        var cssCx = cx / dpr;
        var cssCy = cy / dpr;

        ctx.beginPath();
        ctx.arc(cssCx, cssCy, cssOuterR, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(cssCx, cssCy);
        ctx.rotate((-displayHeading * Math.PI) / 180);

        var tickOuter = cssOuterR;
        for (var deg = 0; deg < 360; deg++) {
          var rad = (deg * Math.PI) / 180;
          var s = Math.sin(rad);
          var c = -Math.cos(rad);
          var isCardinal = deg % 90 === 0;
          var isMajor = deg % 10 === 0;
          var tickInner;

          if (isCardinal) tickInner = tickOuter - 22;
          else if (isMajor) tickInner = tickOuter - 14;
          else tickInner = tickOuter - 8;

          ctx.beginPath();
          ctx.moveTo(s * tickInner, c * tickInner);
          ctx.lineTo(s * tickOuter, c * tickOuter);
          ctx.strokeStyle = isCardinal ? '#333' : 'rgba(0,0,0,0.35)';
          ctx.lineWidth = isCardinal ? 2 : 0.8;
          ctx.stroke();
        }

        var labelR = cssOuterR - 36;
        var cardinals = [
          { deg: 0,   label: 'N' },
          { deg: 90,  label: 'E' },
          { deg: 180, label: 'S' },
          { deg: 270, label: 'W' },
        ];

        cardinals.forEach(function (c) {
          var rad = (c.deg * Math.PI) / 180;
          var x = Math.sin(rad) * labelR;
          var y = -Math.cos(rad) * labelR;
          ctx.font = '600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = c.deg === 0 ? '#007aff' : '#555';
          ctx.fillText(c.label, x, y);
        });

        ctx.restore();

        ctx.beginPath();
        ctx.arc(cssCx, cssCy, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = '#333';
        ctx.fill();

        var pointerY = cssCy - cssOuterR - 1;
        ctx.beginPath();
        ctx.moveTo(cssCx, pointerY);
        ctx.lineTo(cssCx - 9, pointerY - 16);
        ctx.lineTo(cssCx + 9, pointerY - 16);
        ctx.closePath();
        ctx.fillStyle = '#007aff';
        ctx.fill();

        ctx.restore();
      }

      /**
       * Animation loop that smoothly interpolates displayHeading towards
       * targetHeading and requests the next frame.
       *
       * Every second the buffered heading samples are averaged to update
       * the target.
       *
       * @param {number} [ts] - High-resolution timestamp from requestAnimationFrame.
       */
      function lerpHeading(ts) {
        if (ts && ts - lastAvgTime >= 1000 && headingsBuffer.length > 0) {
          updateTarget();
          lastAvgTime = ts;
        }

        if (!hasHeading) {
          requestAnimationFrame(lerpHeading);
          return;
        }
        var delta = targetHeading - displayHeading;
        if (delta > 180) delta -= 360;
        if (delta < -180) delta += 360;
        displayHeading += delta * 0.12;
        if (displayHeading < 0) displayHeading += 360;
        if (displayHeading >= 360) displayHeading -= 360;
        updateBadge();
        draw();
        requestAnimationFrame(lerpHeading);
      }

      /**
       * Averages the buffered heading samples via vector addition and sets
       * targetHeading to the result. Marks hasHeading true on first call.
       */
      function updateTarget() {
        var sumSin = 0, sumCos = 0;
        for (var i = 0; i < headingsBuffer.length; i++) {
          var rad = (headingsBuffer[i] * Math.PI) / 180;
          sumSin += Math.sin(rad);
          sumCos += Math.cos(rad);
        }
        var avgDeg = (Math.atan2(sumSin, sumCos) * 180) / Math.PI;
        if (avgDeg < 0) avgDeg += 360;
        targetHeading = avgDeg;
        hasHeading = true;
        headingsBuffer = [];
      }

      /**
       * Handles deviceorientation events, extracting the compass heading
       * from webkitCompassHeading (absolute) or alpha (relative), and
       * pushing normalised values into the buffer.
       *
       * @param {DeviceOrientationEvent} event - Orientation event from the browser.
       */
      function handleOrientation(event) {
        var h;
        if (event.webkitCompassHeading !== undefined) {
          h = event.webkitCompassHeading;
          isAbsolute = true;
        } else if (event.alpha !== null) {
          h = 360 - event.alpha;
        } else {
          return;
        }
        if (isAbsolute && h < 0) h += 360;
        headingsBuffer.push(h % 360);
      }

      /**
       * Attaches deviceorientation (and deviceorientationabsolute if available)
       * listeners to begin receiving heading data.
       */
      function startListening() {
        if ('ondeviceorientationabsolute' in window) {
          window.addEventListener('deviceorientationabsolute', handleOrientation, true);
        }
        window.addEventListener('deviceorientation', handleOrientation, true);
      }

      /**
       * Displays an error message in the badge element.
       *
       * @param {string} msg - The error message to show.
       */
      function showError(msg) {
        badge.textContent = msg;
        badge.classList.add('error');
      }

      /**
       * Initialises the compass: sizes the canvas, starts the animation loop,
       * requests device-orientation permission when needed, and falls back to
       * an error message if no sensor is detected within 3 seconds.
       */
      function init() {
        resize();
        draw();
        requestAnimationFrame(lerpHeading);
        window.addEventListener('resize', function () {
          resize();
          draw();
        });

        if (!window.DeviceOrientationEvent) {
          showError('Compass not supported');
          return;
        }

        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          overlay.classList.remove('hidden');

          permBtn.addEventListener('click', function () {
            DeviceOrientationEvent.requestPermission()
              .then(function (state) {
                if (state === 'granted') {
                  overlay.classList.add('hidden');
                  startListening();
                } else {
                  showError('Permission denied');
                  overlay.classList.add('hidden');
                }
              })
              .catch(function () {
                showError('Permission error');
                overlay.classList.add('hidden');
              });
          });
        } else {
          startListening();
        }

        setTimeout(function () {
          if (!hasHeading) {
            showError('No compass sensor');
          }
        }, 3000);
      }

      init();

      var locationBadge = document.getElementById('locationBadge');

      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
          function (pos) {
            var lat = pos.coords.latitude;
            var lon = pos.coords.longitude;
            var alt = pos.coords.altitude;
            var acc = pos.coords.accuracy;
            locationBadge.textContent = '📍 ' + lat.toFixed(5) + ', ' + lon.toFixed(5)
              + (alt != null ? ', ' + Math.round(alt) : '')
              + ' (±' + Math.round(acc) + 'm)';
            locationBadge.classList.remove('error');
          },
          function () {
            locationBadge.textContent = '📍 Location unavailable';
            locationBadge.classList.add('error');
          },
          { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }
        );
      }

      menuBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        menuDropdown.classList.toggle('open');
      });

      document.addEventListener('click', function () {
        menuDropdown.classList.remove('open');
      });

      menuDropdown.addEventListener('click', function (e) {
        e.stopPropagation();
      });
    })();
  </script>
</body>
</html>
